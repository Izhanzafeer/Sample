name: Terraform Apply

on:
  push:
    branches: [main]
  workflow_dispatch: 

permissions:
  contents: read

env:
  ARM_USE_MSI: true
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (with backend)
        run: |
            cd Intellect_Hub_Terraform_Script
            terraform init

      - name: Terraform Plan
        run: |
            cd Intellect_Hub_Terraform_Script
            terraform plan
